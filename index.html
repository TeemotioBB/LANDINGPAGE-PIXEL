<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya - Acesso Exclusivo</title>
    <style>
        /* Estilização Geral */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0f0f0f; /* Fundo escuro elegante */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Foto da Maya Redonda */
        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%; /* Faz ficar redondo */
            border: 4px solid #0088cc; /* Borda azul cor do Telegram */
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0px 0px 20px rgba(0, 136, 204, 0.5);
        }

        /* Botão Estilizado */
        .btn-telegram {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 18px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-telegram:hover {
            background-color: #00aaff;
            transform: scale(1.05); /* Efeito de crescer ao passar o mouse */
        }

        .btn-telegram:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <img src="maya.jpg" alt="Maya" class="profile-pic">

    <button class="btn-telegram" onclick="irParaTelegram()">
        CLIQUE PARA ME VER!
    </button>

    <script>
        function irParaTelegram() {
            // 1. Pega o fbclid da URL (ex: ?fbclid=AbC123)
            const urlParams = new URLSearchParams(window.location.search);
            const fbclid = urlParams.get('fbclid');
            
            // 2. Substitua pelo USERNAME do seu bot (sem o @)
            const botUsername = "SEU_BOT_USER"; 
            let telegramUrl = "https://t.me/" + botUsername; 

            // 3. Se existir fbclid, anexa no formato ?start=fbclid_VALOR
            if (fbclid) {
                telegramUrl += "?start=fbclid_" + fbclid;
            }

            // 4. Redireciona o usuário para o Telegram
            window.location.href = telegramUrl;
        }
    </script>

</body>
</html>
