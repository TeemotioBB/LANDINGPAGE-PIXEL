<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya - Acesso Exclusivo</title>

    <meta property="og:title" content="Maya - Acesso Exclusivo">
    <meta property="og:description" content="Clique para falar comigo no Telegram!">
    <meta property="og:image" content="maya.jpg">
    <link rel="icon" href="maya.jpg">

    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '735253462874774'); // Seu Pixel ID extraído do código
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=735253462874774&ev=PageView&noscript=1"
    /></noscript>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0f0f0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #0088cc;
            object-fit: cover;
            margin-bottom: 25px;
            box-shadow: 0px 0px 25px rgba(0, 136, 204, 0.6);
        }

        .btn-telegram {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-telegram:hover {
            background-color: #00aaff;
        }
    </style>
</head>
<body>

    <img src="maya.jpg" alt="Maya" class="profile-pic">

    <button class="btn-telegram" onclick="irParaTelegram()">
        CLIQUE PARA ME VER!
    </button>

    <script>
        function irParaTelegram() {
            // Dispara evento de clique no Pixel para ajudar a Meta
            fbq('track', 'Contact');

            // 1. Captura o fbclid da URL
            const urlParams = new URLSearchParams(window.location.search);
            const fbclid = urlParams.get('fbclid');
            
            // 2. Configura o destino (Username extraído: Mayaoficial_bot)
            const botUsername = "Mayaoficial_bot"; 
            let telegramUrl = "https://t.me/" + botUsername; 

            // 3. Anexa o fbclid como parâmetro de inicialização (Deep Linking)
            if (fbclid) {
                telegramUrl += "?start=fbclid_" + fbclid;
            }

            // 4. Redireciona
            setTimeout(() => {
                window.location.href = telegramUrl;
            }, 300); // Pequeno delay para garantir o disparo do Pixel
        }
    </script>

</body>
</html>
